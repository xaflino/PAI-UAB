<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Validación</title>
    <link rel="stylesheet" href="PrimeraParte.css">
</head>
<body>
    <form id="form">
        <label for="name">Nombre y Apellidos:</label>
        <input type="text" id="name" placeholder="Introduce tu nombre y apellidos">

        <label for="postalCode">Código Postal:</label>
        <input type="text" id="postalCode" placeholder="Introduce tu código postal">

        <label for="email">Correo Electrónico:</label>
        <input type="text" id="email" placeholder="Introduce tu correo electrónico">

        <label for="password">Contraseña:</label>
        <input type="password" id="password" placeholder="Introduce tu contraseña">

        <label for="confirmPassword">Confirmar Contraseña:</label>
        <input type="password" id="confirmPassword" placeholder="Repite tu contraseña">
        
        <label>
            <input type="checkbox" id="privacyCheckbox"> Acepto la política de privacidad
        </label>

        <button type="button" id="submitButton">Enviar</button>
        <button type="button" id="clearButton">Borrar</button>
    </form>

    <script src="PrimeraParte.js"></script>
</body>
</html>
